<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: rgba(0,0,0,0.8); color: white; font-family: sans-serif; }
        .menu-item { border: 1px solid #444; margin: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div id="ui-root">Waiting for Lua data...</div>

    <script>
        window.addEventListener('message', function(event) {
            let data = event.data;
            if (data.activeMenu) {
                let root = document.getElementById('ui-root');
                root.innerHTML = "<h1>Menu Loaded</h1>";
                
                // Loop through your Lua table items
                data.activeMenu.forEach(item => {
                    let div = document.createElement('div');
                    div.className = 'menu-item';
                    div.innerHTML = `Category: ${item.label}`;
                    root.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
