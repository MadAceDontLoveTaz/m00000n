<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moon Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu" class="PWrapper hidden">
        <div class="PElements">
            <div class="PRightElements">
                <div class="PBanner">
                    <span>🌙 MOON MENU</span>
                </div>
                <div id="items" class="PTabs"></div>
            </div>
        </div>
    </div>

    <!-- Input only appears when needed -->
    <div id="inputBox" class="input-box hidden">
        <div id="inputTitle"></div>
        <input id="input" type="text" autocomplete="off">
    </div>

    <script src="script.js"></script>
</body>
</html>
