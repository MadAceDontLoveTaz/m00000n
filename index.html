<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moon Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu" class="PWrapper hidden">
        <div class="PElements">
            <div class="PRightElements">
                <div class="PBanner">
                    <span style="color: #fff; font-size: 1.1vw; font-weight: 600; z-index: 2;">🌙 MOON MENU</span>
                </div>
                
                <div id="items" class="PTabs"></div>
            </div>
        </div>
    </div>

    <!-- Clean Input -->
    <div id="inputBox" class="input-box hidden">
        <div id="inputTitle"></div>
        <input id="input" type="text" autocomplete="off" spellcheck="false">
    </div>

    <script src="script.js"></script>
</body>
</html>
