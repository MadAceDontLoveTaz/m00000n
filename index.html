<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu" class="menu-container hidden">
        <div class="header" id="title">Moon Menu</div>
        
        <div id="items" class="items-container"></div>

        <!-- Input Section -->
        <div id="inputContainer" class="input-container hidden">
            <div id="inputQuestion" class="input-question"></div>
            <input id="inputField" type="text" placeholder="Type here..." autocomplete="off">
            <div class="input-hint">ENTER = Confirm • ESC = Cancel</div>
        </div>

        <div class="footer">Moon Menu • Simple DUI</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
