<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moon Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu" class="PWrapper hidden">
        <div class="PElements">
            <!-- Main Menu Area -->
            <div class="PRightElements">
                <div class="PBanner">
                    <span style="color: #fff; font-size: 1.1vw; font-weight: 600; z-index: 2;">🌙 MOON MENU</span>
                </div>
                
                <div id="items" class="PTabs"></div>

                <!-- Input -->
                <div id="inputBox" class="input-box hidden">
                    <div id="inputTitle" class="input-title"></div>
                    <input id="input" type="text" autocomplete="off">
                    <div class="hint">ENTER = Confirm • ESC = Cancel</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
