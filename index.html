<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: rgba(15, 15, 15, 0.9); color: #00ffcc; font-family: 'Consolas', monospace; }
        .btn { border: 1px solid #00ffcc; padding: 10px; cursor: pointer; margin: 5px; display: inline-block; }
        .btn:hover { background: #00ffcc; color: black; }
    </style>
</head>
<body>
    <div id="status">DUI MOD MENU ACTIVE</div>
    <div class="btn" onclick="sendToLua('Noclip')">TOGGLE NOCLIP</div>

    <script>
        function sendToLua(label) {
            // This is the specific way to talk back to 'onDuiMessage' in Lua
            if (window.parent && window.parent.postMessage) {
                // We send a stringified JSON back to the game engine
                const payload = JSON.stringify({ label: label });
                
                // For most injected DUIs, this triggers the Lua event
                window.exports.sugar.SendMessageToDui(payload); 
                // OR if using standard FiveM DUI:
                // console.log(payload); // Sometimes mapped to message handler
            }
        }

        // Listen for the activeMenu table you sent via MachoSendDuiMessage
        window.addEventListener('message', (event) => {
            if (event.data.activeMenu) {
                document.getElementById('status').innerText = "Menu Data Received!";
            }
        });
    </script>
</body>
</html>
