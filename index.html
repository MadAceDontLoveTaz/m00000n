<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moon Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu" class="menu hidden">
        <div class="header">
            <span class="title">🌙 Moon Menu</span>
        </div>
        
        <div id="items" class="items"></div>

        <!-- Input -->
        <div id="inputBox" class="input-box hidden">
            <div id="inputTitle" class="input-title"></div>
            <input id="input" type="text" autocomplete="off" spellcheck="false">
            <div class="hint">ENTER = Confirm • ESC = Cancel</div>
        </div>

        <div class="footer">Moon Menu • Simple DUI</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
